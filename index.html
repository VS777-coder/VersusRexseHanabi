<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANABI ANALYZER Rev 3.9.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Squada+One&family=Noto+Sans+JP:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: #0c0a09; color: #fbbf24; font-family: 'Noto Sans JP', sans-serif; height: 100dvh; width: 100%; margin: 0; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .rev-tag-top { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #64748b; position: absolute; top: 4px; right: 12px; font-weight: bold; }
        .main-btn { background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%); border: 1px solid #3b82f6; box-shadow: 0 4px 0 #1e3a8a; border-radius: 8px; color: white; font-weight: 900; transition: all 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e3a8a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .log-table { width: 100%; font-size: 11px; border-collapse: separate; border-spacing: 0 4px; }
        .log-table th { color: #94a3b8; font-weight: normal; padding: 4px; text-align: center; border-bottom: 1px solid #334155; }
        .log-table td { background: rgba(15, 23, 42, 0.5); padding: 6px 4px; text-align: center; color: #e2e8f0; font-family: 'Share Tech Mono', monospace; }
        .val-red { color: #f87171 !important; font-weight: bold; }
        .prob-bar-container { height: 24px; background: #1e293b; border-radius: 4px; overflow: hidden; border: 1px solid #334155; position: relative; }
        .prob-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .prob-label { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 900; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        #log-display { scrollbar-width: none; -ms-overflow-style: none; }
        #log-display::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="rev-tag-top">REV 3.9.4 [STABLE]</div>

    <div class="flex items-center justify-between mb-4 mt-2">
        <button id="m-prev" class="w-10 h-10 glass-panel flex items-center justify-center text-2xl">◀</button>
        <div class="text-center flex-1">
            <h1 id="machine-name-display" class="text-2xl font-black italic tracking-tighter" style="font-family:'Squada One'">VERSUS REVISE</h1>
            <div id="date-display" class="text-[10px] text-slate-500 font-mono">----.--.-- --:--</div>
        </div>
        <button id="m-next" class="w-10 h-10 glass-panel flex items-center justify-center text-2xl">▶</button>
    </div>

    <div class="flex-1 glass-panel p-3 mb-4 overflow-hidden flex flex-col">
        <div id="log-display" class="flex-1 overflow-y-auto space-y-2 text-xs font-mono">
            <div class="text-slate-500">READY...</div>
        </div>
        
        <div class="mt-4 pt-4 border-t border-slate-700 space-y-3">
            <div class="grid grid-cols-1 gap-2">
                <div class="flex items-center gap-2"><span class="w-6 text-[10px] font-bold text-slate-400">SET1</span><div class="flex-1 prob-bar-container"><div id="b1" class="prob-bar-fill" style="width: 0%"></div><span id="p1" class="prob-label">0.0%</span></div></div>
                <div class="flex items-center gap-2"><span class="w-6 text-[10px] font-bold text-slate-400">SET2</span><div class="flex-1 prob-bar-container"><div id="b2" class="prob-bar-fill" style="width: 0%"></div><span id="p2" class="prob-label">0.0%</span></div></div>
                <div class="flex items-center gap-2"><span class="w-6 text-[10px] font-bold text-slate-400">SET5</span><div class="flex-1 prob-bar-container"><div id="b5" class="prob-bar-fill" style="width: 0%"></div><span id="p5" class="prob-label">0.0%</span></div></div>
                <div class="flex items-center gap-2"><span class="w-6 text-[10px] font-bold text-slate-400">SET6</span><div class="flex-1 prob-bar-container"><div id="b6" class="prob-bar-fill" style="width: 0%"></div><span id="p6" class="prob-label">0.0%</span></div></div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <label class="main-btn h-14 cursor-pointer">
            <span>UNIMEMO ANALYZE</span>
            <input type="file" id="f-in" class="hidden" accept="image/*">
        </label>
        <button id="sv-all" class="main-btn h-14" style="background: linear-gradient(180deg, #059669 0%, #065f46 100%); border-color: #10b981; box-shadow: 0 4px 0 #064e3b;">
            SAVE
        </button>
    </div>

    <details class="glass-panel text-[10px] text-slate-400">
        <summary class="p-2 cursor-pointer text-center">SETTINGS</summary>
        <div class="p-3 space-y-2 border-t border-slate-800">
            <input type="password" id="gh-token" placeholder="GitHub Token" class="w-full bg-slate-900 border border-slate-700 p-2 rounded">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="api-key" placeholder="API Key" class="w-full bg-slate-900 border border-slate-700 p-2 rounded">
                <input type="text" id="user-name" placeholder="User Name" class="w-full bg-slate-900 border border-slate-700 p-2 rounded">
            </div>
        </div>
    </details>

    <script src="config.js"></script>
    <script>
        const MACHINE_LIST = ["新ハナビ", "スマスロハナビ", "バーサスリヴァイズ"];
        let currentMachineIdx = 2;
        let lastAnalysisResult = null;
        const GH_USER = "vs777-coder";
        const GH_REPO = "VersusRexseHanabi";
        const logDisplay = document.getElementById('log-display');

        const addLog = (m, c="text-slate-400") => { 
            const e=document.createElement('div'); e.className=c; e.innerHTML=m; 
            logDisplay.appendChild(e); logDisplay.scrollTop=logDisplay.scrollHeight; 
        };

        function getMachineDef(name) {
            if (name.includes("バーサス")) return {def:VERSUS_CONFIG, bG:25, name:"バーサスリヴァイズ"}; 
            if (name.includes("スマスロ")) return {def:L_HANABI_CONFIG, bG:20, name:"スマスロハナビ"};
            return {def:HANABI_CONFIG, bG:29, name:"新ハナビ"};
        }

        async function gh(m, p, b=null){ 
            const t = document.getElementById('gh-token').value; 
            if(!t) return null;
            const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${p}`;
            try {
                const res = await fetch(url, {
                    method: m,
                    headers: { Authorization: `token ${t}`, Accept: "application/vnd.github.v3+json" },
                    body: b ? JSON.stringify(b) : null
                });
                return res.ok ? await res.json() : null;
            } catch(e) { return null; }
        }

        async function getUserHash() {
            const k = document.getElementById('api-key').value, n = document.getElementById('user-name').value;
            if(!k || !n) return null;
            const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(k + n));
            return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('').substring(0,12);
        }

        function drawAnalysisLogs(machine, gCounts, extracted, uName, date, merged = []) {
            logDisplay.innerHTML = "";
            let bbCount = 0;
            const fStorage = machine.def.map((df, i) => {
                const da = extracted[i]; 
                let n = gCounts[0], k = (da && da.c !== null) ? da.c : 0;
                if(df.type === "vc" || df.type === "vg" || df.type === "big") n = (da && da.p > 0) ? Math.round(k * da.p) : (bbCount * machine.bG);
                if(df.id === "bb") bbCount = k;
                return { ...df, k, n };
            });

            const t = document.createElement('table'); t.className='log-table';
            t.innerHTML=`<thead><tr><th>項目</th><th>回数</th><th>結果</th><th>1</th><th>2</th><th>5</th><th>6</th></tr></thead><tbody></tbody>`;
            const tb = t.querySelector('tbody');
            fStorage.forEach(res => {
                const r = document.createElement('tr'); 
                const rP = res.k > 0 ? `1/${(res.n/res.k).toFixed(1)}` : "1/---";
                r.innerHTML = `<td style="text-align:left;">${res.name}</td><td>${res.k}</td><td class="${res.active && res.k > 0 ? 'val-red':''}">${rP}</td><td>1/${res.probs[1]}</td><td>1/${res.probs[2]}</td><td>1/${res.probs[5]}</td><td>1/${res.probs[6]}</td>`;
                tb.appendChild(r);
            });
            logDisplay.appendChild(t);

            let totalLLs = {1:0, 2:0, 5:0, 6:0};
            fStorage.forEach(res => {
                if(res.active && res.n > 0 && res.k > 0) {
                    [1,2,5,6].forEach(s => { const tp = 1/res.probs[s]; totalLLs[s] += (res.k * Math.log(tp) + (res.n - res.k) * Math.log(1 - tp)); });
                }
            });
            const mx = Math.max(...Object.values(totalLLs));
            let sm = 0; [1,2,5,6].forEach(s => { sm += Math.exp(totalLLs[s] - mx); });
            [1,2,5,6].forEach(s => {
                let pr = (sm === 0) ? 0 : (Math.exp(totalLLs[s] - mx) / sm) * 100;
                document.getElementById(`p${s}`).innerText = pr.toFixed(1) + "%";
                document.getElementById(`b${s}`).style.width = pr + "%";
            });
        }

        async function saveDataToGitHub() {
            if (!lastAnalysisResult) return;
            const h = await getUserHash(), mName = MACHINE_LIST[currentMachineIdx];
            if (!h) return;
            const dateStr = new Date().toISOString().split('T')[0];
            const path = `data/${h}/${mName}/${dateStr}.json`;
            const existing = await gh("GET", path);
            const body = { message: `Update ${mName}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(lastAnalysisResult)))), sha: existing ? existing.sha : null };
            const res = await gh("PUT", path, body);
            if (res) addLog("SAVED TO CLOUD", "text-green-400");
        }

        async function syncLatestData() {
            const h = await getUserHash(), mName = MACHINE_LIST[currentMachineIdx];
            if(!h) return;
            const files = await gh("GET", `data/${h}/${mName}`);
            if (files && Array.isArray(files)) {
                const last = files.sort((a,b) => a.name.localeCompare(b.name)).pop();
                const res = await gh("GET", last.path);
                if (res) {
                    const data = JSON.parse(decodeURIComponent(escape(atob(res.content))));
                    lastAnalysisResult = data;
                    document.getElementById('date-display').innerText = data.date;
                    drawAnalysisLogs(getMachineDef(data.machineName), data.gameCounts, data.extractedData, data.name, data.date);
                    addLog("LATEST DATA LOADED", "text-blue-400");
                }
            }
        }

        function updateMachineDisplay(){ 
            document.getElementById('machine-name-display').innerText = MACHINE_LIST[currentMachineIdx]; 
            logDisplay.innerHTML = "LOADING..."; syncLatestData(); 
        }

        window.onload = () => { 
            document.getElementById('api-key').value = localStorage.getItem('v_k')||''; 
            document.getElementById('user-name').value = localStorage.getItem('u_n')||''; 
            document.getElementById('gh-token').value = localStorage.getItem('g_t')||''; 
            updateMachineDisplay(); 
        };

        document.getElementById('m-prev').onclick = () => { currentMachineIdx=(currentMachineIdx-1+3)%3; updateMachineDisplay(); };
        document.getElementById('m-next').onclick = () => { currentMachineIdx=(currentMachineIdx+1)%3; updateMachineDisplay(); };
        document.getElementById('sv-all').onclick = async () => { 
            localStorage.setItem('v_k', document.getElementById('api-key').value);
            localStorage.setItem('u_n', document.getElementById('user-name').value);
            localStorage.setItem('g_t', document.getElementById('gh-token').value);
            await saveDataToGitHub(); alert("DONE");
        };
        document.getElementById('f-in').onchange = (e) => { if(e.target.files[0]) addLog("FILE RECEIVED"); };
    </script>
</body>
</html>
