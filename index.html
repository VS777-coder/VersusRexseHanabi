<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANABI ANALYZER Rev 3.9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Squada+One&family=Noto+Sans+JP:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: #0c0a09; color: #fbbf24; font-family: 'Noto Sans JP', sans-serif; height: 100dvh; width: 100%; margin: 0; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .rev-tag-top { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #64748b; position: absolute; top: 4px; right: 12px; font-weight: bold; }
        .main-btn { background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%); border: 2px solid #3b82f6; border-radius: 12px; height: 44px; display: flex; align-items: center; justify-content: center; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .main-btn span { font-weight: 900; font-size: 1.2rem; color: #ffffff; letter-spacing: 1px; }
        .panel-frame { border: 2px solid #1e293b; background: #0f172a; border-radius: 12px; padding: 10px 14px; position: relative; }
        .bar-bg { background-color: #020617; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #1e293b; margin-top: 1px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .log-container { flex-grow: 1; min-height: 0; margin: 8px 0; border: 2px solid #1e293b; background-color: #000000; border-radius: 8px; overflow: hidden; position: relative; }
        .copy-btn { position: absolute; top: 6px; right: 6px; background: #2563eb; color: #fff; font-size: 8px; padding: 3px 8px; border-radius: 4px; z-index: 20; font-weight: bold; }
        .log-body { padding: 4px; font-size: 9px; width: 100%; height: 100%; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; font-family: 'Share Tech Mono', monospace; padding-top: 30px; line-height: 1.3; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 7px; table-layout: fixed; color: #e2e8f0; }
        .log-table th, .log-table td { border: 1px solid #1e293b; padding: 3px 1px; text-align: center; }
        .log-table th { background-color: #1e293b; color: #60a5fa; font-weight: 900; }
        .val-red { color: #ef4444 !important; font-weight: 900; }
        .val-yellow { color: #fbbf24 !important; font-weight: 900; }
        .aura-red { background-color: #b91c1c !important; color: white !important; font-weight: bold; }
        .aura-green { background-color: #15803d !important; color: white !important; font-weight: bold; }
        .aura-yellow { background-color: #a16207 !important; color: white !important; font-weight: bold; }
        .api-input-tiny { background: #0f172a; color: #4b5563; border: 1px solid #1e293b; padding: 2px 4px; font-size: 8px; border-radius: 4px; outline: none; }
        .api-input-name { background: #0f172a; color: #f1f5f9; border: 1px solid #1e293b; padding: 4px 8px; font-size: 12px; font-weight: bold; border-radius: 6px; outline: none; }
        .save-btn { background: #1e40af; color: #ffffff; font-weight: bold; padding: 4px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .nav-btn { background: #1e293b; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .c-s1 { color: #3b82f6; } .c-s2 { color: #eab308; } .c-s5 { color: #22c55e; } .c-s6 { color: #ef4444; }
    </style>
</head>
<body>
    <div class="rev-tag-top">Rev 3.9.2</div>
    <div class="shrink-0 mb-2 mt-4"><label for="f-in" class="main-btn"><span>ユニメモ解析実行</span></label><input type="file" id="f-in" class="hidden" accept="image/*"></div>
    <div class="result-card panel-frame flex flex-col items-center shrink-0">
        <div class="w-full mb-2 flex justify-between items-center font-bold">
            <div class="flex items-center gap-1 text-white text-[11px]"><button id="m-prev" class="nav-btn px-2">◁</button><span id="machine-name-display" class="min-w-[80px]">新ハナビ</span><button id="m-next" class="nav-btn px-2">▷</button></div>
            <div class="flex items-center gap-1 text-white text-[10px]"><button id="d-prev" class="nav-btn px-2">◁</button><span id="date-display" class="font-mono">NO DATA</span><button id="d-next" class="nav-btn px-2">▷</button></div>
        </div>
        <div class="w-full flex flex-col gap-2">
            <div class="flex items-center gap-3"><span class="c-s1 font-black text-[10px] w-10">設定1</span><div class="flex-grow bar-bg"><div id="b1" class="bar-fill bg-blue-500"></div></div><span id="p1" class="c-s1 font-black text-[11px] w-12 text-right">---</span></div>
            <div class="flex items-center gap-3"><span class="c-s2 font-black text-[10px] w-10">設定2</span><div class="flex-grow bar-bg"><div id="b2" class="bar-fill bg-yellow-500"></div></div><span id="p2" class="c-s2 font-black text-[11px] w-12 text-right">---</span></div>
            <div class="flex items-center gap-3"><span class="c-s5 font-black text-[10px] w-10">設定5</span><div class="flex-grow bar-bg"><div id="b5" class="bar-fill bg-green-500"></div></div><span id="p5" class="c-s5 font-black text-[11px] w-12 text-right">---</span></div>
            <div class="flex items-center gap-3"><span class="c-s6 font-black text-[10px] w-10">設定6</span><div class="flex-grow bar-bg"><div id="b6" class="bar-fill bg-red-500"></div></div><span id="p6" class="c-s6 font-black text-[11px] w-12 text-right">---</span></div>
        </div>
    </div>
    <div class="log-container"><button id="copy-log" class="copy-btn">COPY</button><div id="log-display" class="log-body">READY...</div></div>
    <div class="api-footer flex flex-col gap-1 shrink-0">
        <div class="flex gap-1 items-center"><input type="password" id="api-key" class="api-input-tiny flex-grow" placeholder="Vision API Key"><input type="text" id="user-name" class="api-input-name w-1/3" placeholder="Name"></div>
        <div class="flex gap-1 items-center"><input type="password" id="gh-token" class="api-input-tiny flex-grow" placeholder="GitHub Token"><button id="sv-all" class="save-btn">SAVE</button></div>
    </div>

<script>
/* === CONFIGURATIONS === */
const ALEX_CONFIG = [
    { id: "total_u", name: "ボーナス合算", active: true, type: "normal", probs: {1: 179.6, 2: 174.3, 5: 163.4, 6: 149.6} },
    { id: "h_tot", name: "羽合算", active: true, type: "normal", probs: {1: 13.4, 2: 13.0, 5: 12.6, 6: 12.2} },
    { id: "ha", name: "羽Ａ", active: false, type: "normal", probs: {1: 25.0, 2: 25.0, 5: 25.0, 6: 25.0} },
    { id: "hb", name: "羽Ｂ", active: false, type: "normal", probs: {1: 30.0, 2: 30.0, 5: 30.0, 6: 30.0} },
    { id: "ht", name: "３枚役", active: true, type: "normal", probs: {1: 40.5, 2: 38.1, 5: 39.2, 6: 38.3} },
    { id: "bu", name: "ブドウ", active: false, type: "normal", probs: {1: 256.0, 2: 256.0, 5: 256.0, 6: 256.0} },
    { id: "c_tot", name: "チェリー合算", active: false, type: "normal", probs: {1: 21.1, 2: 21.1, 5: 19.9, 6: 19.7} },
    { id: "ca1", name: "チェリーＡ１", active: false, type: "normal", probs: {1: 99.8, 2: 99.8, 5: 82.1, 6: 78.8} },
    { id: "ca2", name: "チェリーＡ２", active: true, type: "normal", probs: {1: 39.5, 2: 39.7, 5: 36.3, 6: 36.0} },
    { id: "cb", name: "チェリーＢ", active: true, type: "normal", probs: {1: 82.6, 2: 82.6, 5: 78.8, 6: 76.7} },
    { id: "total_l", name: "ボーナス合算", active: false, type: "normal", probs: {1: 179.6, 2: 174.3, 5: 163.4, 6: 149.6} },
    { id: "bb_tot", name: "ビッグボーナス合算", active: true, type: "normal", probs: {1: 309.1, 2: 303.4, 5: 295.2, 6: 287.4} },
    { id: "bb_r7", name: "赤７", active: false, type: "normal", probs: {1: 618.2, 2: 606.8, 5: 590.4, 6: 574.8} },
    { id: "bb_7", name: "鳥７", active: false, type: "normal", probs: {1: 618.2, 2: 606.8, 5: 590.4, 6: 574.8} },
    { id: "rb_tot", name: "レギュラーボーナス", active: true, type: "normal", probs: {1: 428.3, 2: 409.6, 5: 366.1, 6: 312.1} },
    { id: "b_ha", name: "ビッグ中 羽鳥Ａ", active: true, type: "big", probs: {1: 4.0, 2: 3.3, 5: 2.3, 6: 2.6} },
    { id: "b_hb", name: "ビッグ中 羽鳥Ｂ", active: true, type: "big", probs: {1: 16.7, 2: 20.0, 5: 14.3, 6: 16.7} },
    { id: "b_hc", name: "ビッグ中 羽鳥Ｃ", active: true, type: "big", probs: {1: 10922.7, 2: 372.4, 5: 744.7, 6: 372.4} }
];

/* その他ハナビ等の設定 (省略) */

const MACHINE_LIST = ["新ハナビ", "スマスロハナビ", "バーサスリヴァイズ", "アレックスブライド"];
let currentMachineIdx = 2; let lastAnalysisResult = null; 
const GH_USER = "vs777-coder"; const GH_REPO = "VersusRexseHanabi";
const logDisplay = document.getElementById('log-display');
const addLog = (m, c="text-slate-400") => { const e=document.createElement('div'); e.className=c; e.innerHTML=m; logDisplay.appendChild(e); logDisplay.scrollTop=logDisplay.scrollHeight; };
let hPaths = []; let hIdx = -1;

function getMachineDef(name) {
    if (name.includes("アレックス")) return {def:ALEX_CONFIG, bG:0, name:"アレックスブライド"};
    if (name.includes("バーサス")) return {def:VERSUS_CONFIG, bG:28, name:"バーサスリヴァイズ"};
    if (name.includes("スマスロ")) return {def:L_HANABI_CONFIG, bG:20, name:"スマスロハナビ"};
    return {def:HANABI_CONFIG, bG:29, name:"新ハナビ"};
}

/* GitHub API通信, saveCloud 等 (省略) */

function drawAnalysisLogs(machine, gCounts, extracted, uNameOverride = null, dateOverride = null) {
    let bbCount = 0;
    let calculatedBigG = 0;

    // --- アレックス専用：BIG中母数の物理逆算 ---
    if (machine.name.includes("アレックス")) {
        const targetIdx = machine.def.findIndex(d => d.id === "b_ha");
        if (targetIdx !== -1 && extracted[targetIdx] && extracted[targetIdx].p > 0) {
            calculatedBigG = Math.round(extracted[targetIdx].c * extracted[targetIdx].p);
        }
    }

    const fStorage = machine.def.map((df, i) => {
        const da = extracted[i]; 
        let n = gCounts[0]; 
        let k = (da && da.c !== null) ? da.c : 0;

        if(df.type === "vc" || df.type === "vg" || df.type === "big") {
            if (machine.name.includes("アレックス") && df.type === "big" && calculatedBigG > 0) {
                n = calculatedBigG;
            } else {
                n = (da && da.p > 0) ? Math.round(k * da.p) : (bbCount * machine.bG);
            }
        }
        if(df.id === "bb") bbCount = k; 
        return { ...df, k, n };
    });

    addLog(`\n（４）定義表への当て込み`, "text-blue-400 font-bold");
    const t4 = document.createElement('table'); t4.className='log-table';
    t4.innerHTML=`<thead><tr><th style="width:28%">項目</th><th style="width:12%">回数</th><th style="width:16%">結果</th><th>1</th><th>2</th><th>5</th><th>6</th></tr></thead><tbody></tbody>`;
    const tb4 = t4.querySelector('tbody');

    let lastType = "";
    fStorage.forEach(res => {
        // --- ログタイトルの出力補正 ---
        if(res.type !== lastType) {
            let displayG = res.n;
            if (machine.name.includes("アレックス") && res.type === "big" && calculatedBigG > 0) displayG = calculatedBigG;
            addLog(`--- ${res.type === "normal" ? "通常" : res.type === "big" ? "BIG中" : res.type.toUpperCase()}(${displayG}G) ---`, "text-slate-500");
            lastType = res.type;
        }

        const r = document.createElement('tr'); 
        const rP_num = res.k > 0 ? (res.n / res.k) : 0; 
        const rP_str = res.k > 0 ? `1/${rP_num.toFixed(1)}` : "1/---";
        let rowHtml = `<td style="text-align:left; padding-left:2px;">${res.name}</td><td>${res.k}</td><td class="${res.active && res.k > 0 ? 'val-red' : ''}">${rP_str}</td>`;
        
        if (res.active) {
            const diffs = [1, 2, 5, 6].map(s => res.k === 0 ? 1 / res.probs[s] : Math.abs(rP_num - res.probs[s]));
            const minDiff = Math.min(...diffs);
            [1, 2, 5, 6].forEach((s, idx) => { rowHtml += `<td class="${diffs[idx] === minDiff ? 'val-yellow' : ''}">1/${res.probs[s].toFixed(1)}</td>`; });
        } else { 
            [1, 2, 5, 6].forEach(s => { rowHtml += `<td>1/${res.probs[s].toFixed(1)}</td>`; }); 
        }
        r.innerHTML = rowHtml; tb4.appendChild(r);
    });
    logDisplay.appendChild(t4);

    /* 尤度計算 (intensityData), 設定判別処理 (totalLLs) 移行のロジックは既存のまま継続 */
    // ... (以下、確率密度関数およびDOM更新処理) ...
}

/* run(file) OCRメイン処理, イベントリスナー等は既存 Rev 3.9.2 に準拠 */
</script>
</body>
</html>
