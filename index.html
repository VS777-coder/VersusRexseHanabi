<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANABI ANALYZER Rev 3.9.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Squada+One&family=Noto+Sans+JP:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: #0c0a09; color: #fbbf24; font-family: 'Noto Sans JP', sans-serif; height: 100dvh; width: 100%; margin: 0; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .rev-tag-top { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #64748b; position: absolute; top: 4px; right: 12px; font-weight: bold; }
        .main-btn { background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%); border: 2px solid #3b82f6; border-radius: 12px; height: 44px; display: flex; align-items: center; justify-content: center; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .main-btn span { font-weight: 900; font-size: 1.2rem; color: #ffffff; letter-spacing: 1px; }
        .panel-frame { border: 2px solid #1e293b; background: #0f172a; border-radius: 12px; padding: 10px 14px; position: relative; }
        .bar-bg { background-color: #020617; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #1e293b; margin-top: 4px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .log-container { flex-grow: 1; min-height: 0; margin: 8px 0; border: 2px solid #1e293b; background-color: #000000; border-radius: 8px; overflow: hidden; position: relative; }
        .copy-btn { position: absolute; top: 6px; right: 6px; background: #2563eb; color: #fff; font-size: 8px; padding: 3px 8px; border-radius: 4px; z-index: 20; font-weight: bold; }
        .log-body { padding: 4px; font-size: 9px; width: 100%; height: 100%; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; font-family: 'Share Tech Mono', monospace; padding-top: 30px; line-height: 1.3; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 7px; table-layout: fixed; color: #e2e8f0; }
        .log-table th, .log-table td { border: 1px solid #1e293b; padding: 3px 1px; text-align: center; }
        .log-table th { background-color: #1e293b; color: #60a5fa; font-weight: 900; }
        .val-red { color: #ef4444 !important; font-weight: 900; }
        .api-input-tiny { background: #0f172a; color: #4b5563; border: 1px solid #1e293b; padding: 2px 4px; font-size: 8px; border-radius: 4px; outline: none; }
        .api-input-name { background: #0f172a; color: #f1f5f9; border: 1px solid #1e293b; padding: 4px 8px; font-size: 12px; font-weight: bold; border-radius: 6px; outline: none; }
        .save-btn { background: #1e40af; color: #ffffff; font-weight: bold; padding: 4px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .nav-btn { background: #1e293b; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .c-s1 { color: #3b82f6; } .c-s2 { color: #eab308; } .c-s5 { color: #22c55e; } .c-s6 { color: #ef4444; }
    </style>
</head>
<body>
    <div class="rev-tag-top">Rev 3.9.4</div>
    <div class="shrink-0 mb-2 mt-4"><label for="f-in" class="main-btn"><span>ユニメモ解析実行</span></label><input type="file" id="f-in" class="hidden" accept="image/*"></div>
    <div class="result-card panel-frame flex flex-col items-center">
        <div class="w-full mb-3 flex justify-between items-center font-bold">
            <div class="flex items-center gap-1 text-white text-[10px]"><button id="m-prev" class="nav-btn">◁</button><span id="machine-name-display" class="min-w-[70px]">バーサスリヴァイズ</span><button id="m-next" class="nav-btn">▷</button></div>
            <div class="flex items-center gap-1 text-white text-[9px]"><button id="d-prev" class="nav-btn">◁</button><span id="date-display" class="font-mono">NO DATA</span><button id="d-next" class="nav-btn">▷</button></div>
        </div>
        <div class="w-full flex flex-col gap-2">
            <div><div class="flex justify-between items-end"><span class="c-s1 font-black text-[10px]">設定1</span><span id="p1" class="c-s1 font-black text-sm">---</span></div><div class="bar-bg"><div id="b1" class="bar-fill bg-blue-500"></div></div></div>
            <div><div class="flex justify-between items-end"><span class="c-s2 font-black text-[10px]">設定2</span><span id="p2" class="c-s2 font-black text-sm">---</span></div><div class="bar-bg"><div id="b2" class="bar-fill bg-yellow-500"></div></div></div>
            <div><div class="flex justify-between items-end"><span class="c-s5 font-black text-[10px]">設定5</span><span id="p5" class="c-s5 font-black text-sm">---</span></div><div class="bar-bg"><div id="b5" class="bar-fill bg-green-500"></div></div></div>
            <div><div class="flex justify-between items-end"><span class="c-s6 font-black text-[10px]">設定6</span><span id="p6" class="c-s6 font-black text-sm">---</span></div><div class="bar-bg"><div id="b6" class="bar-fill bg-red-500"></div></div></div>
        </div>
    </div>
    <div class="log-container"><button id="copy-log" class="copy-btn">COPY</button><div id="log-display" class="log-body">READY...</div></div>
    <div class="api-footer flex flex-col gap-1">
        <div class="flex gap-1 items-center"><input type="password" id="api-key" class="api-input-tiny flex-grow" placeholder="Vision API Key"><input type="text" id="user-name" class="api-input-name w-1/3" placeholder="Name"></div>
        <div class="flex gap-1 items-center"><input type="password" id="gh-token" class="api-input-tiny flex-grow" placeholder="GitHub Token"><button id="sv-all" class="save-btn">SAVE</button></div>
    </div>

<script src="config.js"></script>
<script>
const MACHINE_LIST = ["新ハナビ", "スマスロハナビ", "バーサスリヴァイズ"];
let currentMachineIdx = 2; 
let lastAnalysisResult = null; 
const GH_USER = "vs777-coder"; const GH_REPO = "VersusRexseHanabi";
const logDisplay = document.getElementById('log-display');

const addLog = (m, c="text-slate-400") => { const e=document.createElement('div'); e.className=c; e.innerHTML=m; logDisplay.appendChild(e); logDisplay.scrollTop=logDisplay.scrollHeight; };

function getMachineDef(name) {
    if (name.includes("バーサス")) return {def:VERSUS_CONFIG, bG:25, name:"バーサスリヴァイズ"}; 
    if (name.includes("スマスロ")) return {def:L_HANABI_CONFIG, bG:20, name:"スマスロハナビ"};
    return {def:HANABI_CONFIG, bG:29, name:"新ハナビ"};
}

// 保存時のSHA取得対応
async function gh(m,p,b=null){ 
    const t=document.getElementById('gh-token').value; if(!t)return null;
    const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${p}`;
    try {
        const res=await fetch(url,{method:m,headers:{Authorization:`token ${t}`,Accept:"application/vnd.github.v3+json"},body:b?JSON.stringify(b):null});
        return res.ok?await res.json():null;
    } catch(e) { return null; }
}

// 【完動ロジック維持】描画・判別
function drawAnalysisLogs(machine, gCounts, extracted, uName = null, date = null, merged = []) {
    let bbCount = 0;
    const fStorage = machine.def.map((df, i) => {
        const da = extracted[i]; 
        let n = gCounts[0];
        let k = (da && da.c !== null) ? da.c : 0;
        if(df.type === "vc" || df.type === "vg" || df.type === "big") n = (da && da.p > 0) ? Math.round(k * da.p) : (bbCount * machine.bG);
        if(df.id === "bb") bbCount = k;
        return { ...df, k, n };
    });

    const t4 = document.createElement('table'); t4.className='log-table';
    t4.innerHTML=`<thead><tr><th>項目</th><th>回数</th><th>結果</th><th>1</th><th>2</th><th>5</th><th>6</th></tr></thead><tbody></tbody>`;
    const tb4 = t4.querySelector('tbody');
    fStorage.forEach(res => {
        const r = document.createElement('tr'); 
        const rP_num = res.k > 0 ? (res.n / res.k) : 0;
        const rP_str = res.k > 0 ? `1/${rP_num.toFixed(1)}` : "1/---";
        let rowHtml = `<td style="text-align:left; padding-left:2px;">${res.name}</td><td>${res.k}</td><td class="${res.active && res.k > 0 ? 'val-red' : ''}">${rP_str}</td>`;
        [1, 2, 5, 6].forEach(s => { rowHtml += `<td>1/${res.probs[s].toFixed(1)}</td>`; });
        r.innerHTML = rowHtml; tb4.appendChild(r);
    });

    // 中段チェリー
    let midCherryCount = 0; const midCherryProbs = { 1: 16384.0, 2: 16384.0, 5: 16384.0, 6: 897.8 };
    const bG_total = bbCount * machine.bG;
    if (machine.name === "バーサスリヴァイズ") {
        const hitIdx = merged.findIndex(line => line.includes("中段") && line.includes("チェリー"));
        if (hitIdx !== -1) {
            let p_val = 0, c_val = null;
            const search = [merged[hitIdx-1]||"", merged[hitIdx+1]||"", merged[hitIdx+2]||""];
            for (let line of search) {
                const clL = line.replace(/[\s,]/g,'');
                const dm = clL.match(/(\d+\.\d+)/); if(dm) p_val = parseFloat(dm[1]);
                const nm = clL.match(/(\d+)/); if(nm && !clL.includes('.')) c_val = parseInt(nm[1]);
            }
            midCherryCount = (p_val > 0) ? Math.round(bG_total / p_val) : (c_val || 0);
        }
        const r = document.createElement('tr');
        const rP_str = midCherryCount > 0 ? `1/${(bG_total / midCherryCount).toFixed(1)}` : "1/---";
        let rowHtml = `<td style="text-align:left; padding-left:2px;">中段チェリー</td><td>${midCherryCount}</td><td class="${midCherryCount > 0 ? 'val-red' : ''}">${rP_str}</td>`;
        [1, 2, 5, 6].forEach(s => { rowHtml += `<td>1/${midCherryProbs[s].toFixed(1)}</td>`; });
        r.innerHTML = rowHtml; tb4.appendChild(r);
    }
    logDisplay.appendChild(t4);

    let totalLLs = {1:0, 2:0, 5:0, 6:0};
    fStorage.forEach(res => {
        if(res.active && res.n > 0 && res.k > 0) {
            [1,2,5,6].forEach(s => { const tp = 1/res.probs[s]; totalLLs[s] += (res.k * Math.log(tp) + (res.n - res.k) * Math.log(1 - tp)); });
        }
    });
    if (machine.name === "バーサスリヴァイズ" && midCherryCount > 0) {
        [1,2,5,6].forEach(s => { const tp = 1 / midCherryProbs[s]; totalLLs[s] += (midCherryCount * Math.log(tp) + (bG_total - midCherryCount) * Math.log(1 - tp)); });
    }

    const mx = Math.max(...Object.values(totalLLs)); let sm = 0; [1,2,5,6].forEach(s => { sm += Math.exp(totalLLs[s] - mx); });
    [1,2,5,6].forEach(s => {
        let pr = (sm === 0) ? 0 : (Math.exp(totalLLs[s] - mx) / sm) * 100;
        document.getElementById(`p${s}`).innerText = pr.toFixed(1) + "%";
        document.getElementById(`b${s}`).style.width = pr + "%";
    });
}

// 【完動ロジック維持】OCR解析
document.getElementById('f-in').onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    const apiKey = document.getElementById('api-key').value;
    if (!apiKey) { alert("Vision API Key!"); return; }

    logDisplay.innerHTML = ""; addLog("ANALYZING...");
    const reader = new FileReader();
    reader.onload = async (re) => {
        const base64 = re.target.result.split(',')[1];
        try {
            const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                method: 'POST',
                body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION' }] }] })
            });
            const json = await res.json();
            const text = json.responses[0].fullTextAnnotation.text;
            const lines = text.split('\n');
            
            addLog("--- OCR RAW ---"); addLog(text.substring(0,100) + "...");
            
            const machine = getMachineDef(MACHINE_LIST[currentMachineIdx]);
            const gMatch = text.match(/(\d+)G/);
            const gameCounts = [gMatch ? parseInt(gMatch[1]) : 0];
            
            const extracted = machine.def.map(df => {
                const reg = new RegExp(df.name + "[^\\d]*(\\d+)", 'i');
                const m = text.match(reg);
                return { c: m ? parseInt(m[1]) : 0, p: 0 };
            });

            lastAnalysisResult = {
                machineName: machine.name,
                date: new Date().toLocaleString('ja-JP'),
                gameCounts: gameCounts,
                extractedData: extracted,
                name: document.getElementById('user-name').value
            };
            drawAnalysisLogs(machine, gameCounts, extracted, null, null, lines);
        } catch(err) { addLog("FAIL: " + err.message, "text-red-500"); }
    };
    reader.readAsDataURL(file);
};

async function syncHistory(mName){
    const k=document.getElementById('api-key').value, n=document.getElementById('user-name').value;
    if(!k||!n) { logDisplay.innerHTML = "READY"; return; }
    const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(k+n)).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').substring(0,12));
    const res=await gh("GET",`data/${h}/${mName}?t=${Date.now()}`);
    if(res&&Array.isArray(res)){ 
        const last = res.sort((a,b)=>a.name.localeCompare(b.name)).pop();
        const detail = await gh("GET", last.path);
        if(detail && detail.content){
            const s=JSON.parse(decodeURIComponent(escape(atob(detail.content))));
            document.getElementById('date-display').innerText = s.date;
            drawAnalysisLogs(getMachineDef(s.machineName), s.gameCounts, s.extractedData);
            return;
        }
    }
    logDisplay.innerHTML = "READY";
}

function updateMachineDisplay(){ 
    const mName = MACHINE_LIST[currentMachineIdx]; 
    document.getElementById('machine-name-display').innerText = mName; 
    logDisplay.innerHTML="LOADING..."; syncHistory(mName); 
}

// 指示通りの保存修正
document.getElementById('sv-all').onclick=async ()=>{ 
    const vk=document.getElementById('api-key').value, un=document.getElementById('user-name').value, gt=document.getElementById('gh-token').value;
    localStorage.setItem('v_k',vk); localStorage.setItem('u_n',un); localStorage.setItem('g_t',gt);
    
    if(lastAnalysisResult && gt) {
        const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(vk+un)).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').substring(0,12));
        const dateId = lastAnalysisResult.date.replace(/[/:\s]/g, '');
        const path = `data/${h}/${MACHINE_LIST[currentMachineIdx]}/${dateId}.json`;
        const existing = await gh("GET", path);
        const res = await gh("PUT", path, {
            message: "Rev 3.9.4 Save",
            content: btoa(unescape(encodeURIComponent(JSON.stringify(lastAnalysisResult)))),
            sha: existing ? existing.sha : null
        });
        if(res) alert("CLOUD SAVED");
    }
    alert("SAVED");
};

window.onload=()=>{ 
    document.getElementById('api-key').value=localStorage.getItem('v_k')||''; 
    document.getElementById('user-name').value=localStorage.getItem('u_n')||''; 
    document.getElementById('gh-token').value=localStorage.getItem('g_t')||''; 
    setTimeout(() => { if(typeof VERSUS_CONFIG !== 'undefined') updateMachineDisplay(); }, 500);
};

document.getElementById('m-prev').onclick=()=>{ currentMachineIdx=(currentMachineIdx-1+3)%3; updateMachineDisplay(); };
document.getElementById('m-next').onclick=()=>{ currentMachineIdx=(currentMachineIdx+1)%3; updateMachineDisplay(); };
</script>
</body>
</html>
