<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANABI ANALYZER Rev 4.0.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Squada+One&family=Noto+Sans+JP:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: #0c0a09; color: #fbbf24; font-family: 'Noto Sans JP', sans-serif; height: 100dvh; width: 100%; margin: 0; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .rev-tag-top { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #64748b; position: absolute; top: 4px; right: 12px; font-weight: bold; }
        .main-btn { background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%); border-bottom: 4px solid #1e3a8a; text-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        .main-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .lcd-panel { background: #1c1917; border: 2px solid #444; position: relative; overflow-y: auto; scrollbar-width: none; }
        .vignette { position: absolute; inset: 0; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); pointer-events: none; }
        .machine-title { font-family: 'Squada One', cursive; letter-spacing: 1px; }
        .status-bar { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #4ade80; }
        .log-entry { border-left: 2px solid #2563eb; padding-left: 8px; margin-bottom: 4px; font-size: 12px; line-height: 1.4; color: #d6d3d1; }
        .val-num { color: #fff; font-weight: 900; }
        .bar-bg { background: #292524; height: 8px; border-radius: 4px; margin-top: 4px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease-out; }
    </style>
</head>
<body>
    <div class="rev-tag-top">REV 4.0.0 / VS_bG25_MID_CHE</div>

    <div class="flex items-center justify-between mb-3 shrink-0">
        <button id="m-prev" class="w-10 h-10 flex items-center justify-center bg-stone-800 rounded-lg text-white font-bold">〈</button>
        <div class="text-center">
            <h1 id="m-name" class="machine-title text-2xl font-black italic text-white leading-none tracking-tighter">VERSUS REVISE</h1>
            <div id="m-status" class="status-bar mt-1">READY</div>
        </div>
        <button id="m-next" class="w-10 h-10 flex items-center justify-center bg-stone-800 rounded-lg text-white font-bold">〉</button>
    </div>

    <div id="lcd" class="lcd-panel flex-1 rounded-sm p-3 mb-3 border-stone-700 shadow-2xl relative">
        <div id="log-container" class="relative z-10"></div>
        <div class="vignette"></div>
    </div>

    <div class="flex items-center justify-between mb-4 px-1 shrink-0">
        <button id="d-prev" class="px-4 py-2 bg-stone-800 rounded text-xs font-bold text-stone-400">PREV</button>
        <div id="d-info" class="text-[10px] text-stone-500 font-bold uppercase tracking-widest text-center">HISTORY</div>
        <button id="d-next" class="px-4 py-2 bg-stone-800 rounded text-xs font-bold text-stone-400">NEXT</button>
    </div>

    <div class="grid grid-cols-2 gap-3 shrink-0">
        <label class="main-btn flex items-center justify-center h-14 rounded-xl cursor-pointer">
            <span class="font-black text-lg text-white tracking-widest">SCAN IMAGE</span>
            <input type="file" id="f-in" class="hidden" accept="image/*">
        </label>
        <button id="sv-all" class="main-btn bg-stone-700 border-stone-800 h-14 rounded-xl font-black text-lg text-white tracking-widest text-center uppercase">Save & Sync</button>
    </div>

    <div class="mt-4 grid grid-cols-3 gap-2 shrink-0">
        <input type="password" id="api-key" class="bg-stone-900 border border-stone-700 rounded p-1 text-[10px] text-stone-400" placeholder="API_KEY">
        <input type="text" id="user-name" class="bg-stone-900 border border-stone-700 rounded p-1 text-[10px] text-stone-400" placeholder="GH_USER">
        <input type="password" id="gh-token" class="bg-stone-900 border border-stone-700 rounded p-1 text-[10px] text-stone-400" placeholder="GH_TOKEN">
    </div>

    <script>
        const L_HANABI_CONFIG = [
            { id: "total", name: "ボーナス合算", active: false, type: "normal", probs: {1: 169.8, 2: 161.0, 5: 149.3, 6: 138.8} },
            { id: "bb", name: "ビックボーナス", active: true, type: "normal", probs: {1: 297.9, 2: 292.6, 5: 284.9, 6: 273.1} },
            { id: "rb", name: "レギュラーボーナス", active: true, type: "normal", probs: {1: 394.8, 2: 358.1, 5: 313.6, 6: 282.5} },
            { id: "ba", name: "風鈴Ａ", active: true, type: "normal", probs: {1: 12.9, 2: 12.5, 5: 12.1, 6: 11.5} },
            { id: "bb_b", name: "風鈴Ｂ", active: true, type: "normal", probs: {1: 38.4, 2: 38.7, 5: 36.2, 6: 34.5} },
            { id: "ia", name: "氷Ａ", active: true, type: "normal", probs: {1: 46.3, 2: 47.3, 5: 46.2, 6: 47.4} },
            { id: "ca2", name: "チェリーＡ２", active: true, type: "normal", probs: {1: 21.0, 2: 19.4, 5: 20.5, 6: 19.6} },
            { id: "cb", name: "チェリーＢ", active: true, type: "normal", probs: {1: 307.7, 2: 306.2, 5: 300.6, 6: 297.9} },
            { id: "vc", name: "ハナビチャレンジ中ハズレ", active: true, type: "vc", probs: {1: 4.7, 2: 4.5, 5: 4.3, 6: 4.2} },
            { id: "vg", name: "ハナビゲーム中ハズレ", active: true, type: "vg", probs: {1: 6.4, 2: 6.0, 5: 5.4, 6: 5.4} },
            { id: "b_bb", name: "BIG中風鈴Ｂ", active: true, type: "big", probs: {1: 10.0, 2: 7.0, 5: 10.0, 6: 7.0} }
        ];

        const HANABI_CONFIG = [
            { id: "bb", name: "ビックボーナス", active: true, type: "normal", probs: {1: 277.7, 2: 268.6, 5: 256.0, 6: 248.2} },
            { id: "rb", name: "レギュラーボーナス", active: true, type: "normal", probs: {1: 356.2, 2: 331.0, 5: 306.2, 6: 280.1} },
            { id: "ba", name: "風鈴Ａ", active: true, type: "normal", probs: {1: 15.3, 2: 14.9, 5: 14.5, 6: 14.1} },
            { id: "bb_b", name: "風鈴Ｂ", active: true, type: "normal", probs: {1: 15.3, 2: 15.6, 5: 15.3, 6: 15.1} },
            { id: "ia", name: "氷Ａ", active: true, type: "normal", probs: {1: 52.9, 2: 53.5, 5: 49.6, 6: 50.8} },
            { id: "ca2", name: "チェリーＡ２", active: true, type: "normal", probs: {1: 21.0, 2: 19.3, 5: 20.6, 6: 19.9} },
            { id: "cb", name: "チェリーＢ", active: true, type: "normal", probs: {1: 282.5, 2: 281.3, 5: 276.5, 6: 274.2} },
            { id: "vc", name: "ハナビチャレンジ中ハズレ", active: true, type: "vc", probs: {1: 6.0, 2: 5.8, 5: 5.3, 6: 5.1} },
            { id: "vg", name: "ハナビゲーム中ハズレ", active: true, type: "vg", probs: {1: 13.4, 2: 12.4, 5: 10.1, 6: 9.5} },
            { id: "nf", name: "斜め風鈴", active: true, type: "big", probs: {1: 11.0, 2: 9.0, 5: 11.0, 6: 9.0} }
        ];

        const VERSUS_CONFIG = [
            { id: "bb", name: "ビックボーナス合算", active: true, type: "normal", probs: {1: 292.6, 2: 284.9, 5: 275.4, 6: 264.3} },
            { id: "rb", name: "レギュラーボーナス", active: true, type: "normal", probs: {1: 374.5, 2: 341.3, 5: 319.7, 6: 292.6} },
            { id: "ba", name: "ベルＡ", active: true, type: "normal", probs: {1: 10.9, 2: 10.7, 5: 10.5, 6: 10.2} },
            { id: "bb_b", name: "ベルＢ", active: true, type: "normal", probs: {1: 20.9, 2: 21.2, 5: 20.3, 6: 20.6} },
            { id: "sa", name: "スイカＡ", active: true, type: "normal", probs: {1: 74.5, 2: 70.6, 5: 72.5, 6: 68.8} },
            { id: "cb", name: "チェリーＢ", active: true, type: "normal", probs: {1: 56.2, 2: 57.7, 5: 53.1, 6: 54.4} },
            { id: "vc", name: "バーサスチャンス中ハズレ", active: true, type: "vc", probs: {1: 5.0, 2: 4.9, 5: 4.6, 6: 4.5} },
            { id: "vg", name: "バーサスゲーム中ハズレ", active: true, type: "vg", probs: {1: 10.1, 2: 9.4, 5: 8.7, 6: 8.1} },
            { id: "cbs", name: "チェリー＋ベル揃い", active: true, type: "big", probs: {1: 11.1, 2: 8.9, 5: 11.1, 6: 8.9} },
            { id: "cbh", name: "チェリー＋ベルはずれ", active: true, type: "big", probs: {1: 256.0, 2: 128.0, 5: 256.0, 6: 128.0} },
            { id: "mid_c", name: "中段チェリー", active: true, type: "big", probs: {1: 16384.0, 2: 16384.0, 5: 16384.0, 6: 897.8} }
        ];

        const MACHINE_LIST = [
            { name: "S HANABI", def: L_HANABI_CONFIG, bG: 20, vG: 20 },
            { name: "SHIN HANABI", def: HANABI_CONFIG, bG: 29, vG: 20 },
            { name: "VERSUS REVISE", def: VERSUS_CONFIG, bG: 25, vG: 20 }
        ];

        let currentIdx = 2; // VERSUS Default
        let history = [];
        let hIdx = -1;
        let lastResult = null;

        function addLog(msg, color="") {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `log-entry ${color}`;
            div.innerHTML = msg;
            container.appendChild(div);
            document.getElementById('lcd').scrollTop = document.getElementById('lcd').scrollHeight;
        }

        async function analyze(file) {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) return alert("API KEY REQUIRED");

            document.getElementById('log-container').innerHTML = '';
            addLog("SCANNING IMAGE...");

            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        requests: [{ image: { content: base64 }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }] }]
                    })
                });
                const data = await res.json();
                if (data.responses[0].fullTextAnnotation) {
                    processText(data.responses[0].fullTextAnnotation);
                } else {
                    addLog("OCR ERROR: NO TEXT FOUND", "text-red-500");
                }
            };
            reader.readAsDataURL(file);
        }

        function processText(annotation) {
            const lines = [];
            annotation.pages.forEach(p => p.blocks.forEach(b => b.paragraphs.forEach(pr => {
                const txt = pr.words.map(w => w.symbols.map(s => s.text).join('')).join('');
                lines.push({txt, y: pr.boundingBox.vertices[0].y});
            })));
            lines.sort((a,b) => a.y - b.y);
            const merged = lines.map(l => l.txt);

            const machine = MACHINE_LIST[currentIdx];
            let totalG = 0, bb = 0;

            // 1. Get Basic Info
            merged.forEach((l, i) => {
                if(l.includes("プレイ数")) totalG = parseInt((merged[i+1]||"0").replace(/,/g,''));
                if(l.includes("#BB") || (l.includes("BB") && !l.includes("中"))) bb = parseInt((merged[i+1]||"0").replace(/,/g,''));
            });

            // 2. Extract Data
            const extracted = [];
            let ptr = 0;
            machine.def.forEach(d => {
                let found = false;
                while(ptr < merged.length) {
                    const l = merged[ptr++];
                    if(l.includes('/') && !l.includes(':')) {
                        let count = 0;
                        for(let j=1; j<=3; j++) {
                            const m = (merged[ptr-j-1]||"").match(/(\d+)/);
                            if(m) { count = parseInt(m[1]); break; }
                        }
                        extracted.push({ ...d, count });
                        found = true; break;
                    }
                }
                if(!found) extracted.push({ ...d, count: 0 });
            });

            calculate(machine, totalG, bb, extracted);
        }

        function calculate(machine, totalG, bb, data) {
            let ll = {1:0, 2:0, 5:0, 6:0};
            
            data.forEach(it => {
                if(!it.active) return;
                // 分母決定 (逆算ロジックはあえて簡略化せず、実数Gを優先)
                let n = it.type === "normal" ? totalG : (it.type === "big" ? bb * machine.bG : bb * 20);
                if(n <= 0) return;

                [1,2,5,6].forEach(s => {
                    const p = 1 / it.probs[s];
                    ll[s] += it.count * Math.log(p) + (n - it.count) * Math.log(1 - p);
                });
            });

            const maxLL = Math.max(...Object.values(ll));
            let sum = 0; const probs = {};
            [1,2,5,6].forEach(s => { probs[s] = Math.exp(ll[s] - maxLL); sum += probs[s]; });
            [1,2,5,6].forEach(s => probs[s] /= sum);

            lastResult = { machine: machine.name, totalG, bb, data, probs, date: new Date().toLocaleString() };
            displayResult(lastResult);
        }

        function displayResult(res) {
            document.getElementById('log-container').innerHTML = '';
            addLog(`${res.machine} - ${res.totalG}G`, "font-bold text-white");
            [1,2,5,6].forEach(s => {
                const p = (res.probs[s]*100).toFixed(1);
                addLog(`SETTING ${s}: <span class="val-num">${p}%</span>`);
                const bar = `<div class="bar-bg"><div class="bar-fill" style="width:${p}%; background:${s==6?'#ef4444':s==5?'#22c55e':s==2?'#eab308':'#3b82f6'}"></div></div>`;
                addLog(bar);
            });
            // 詳細内訳
            addLog("<br>【DETAIL】", "text-stone-500 text-[10px]");
            res.data.forEach(d => {
                if(d.count > 0) addLog(`${d.name}: ${d.count}回`, "text-[10px] text-stone-400");
            });
        }

        // --- Save & History Functions ---

        async function syncGH(isUpload = false) {
            const user = document.getElementById('user-name').value;
            const token = document.getElementById('gh-token').value;
            if(!user || !token) return;

            const repo = "h-data";
            const machineFolder = MACHINE_LIST[currentIdx].name.replace(/ /g, '_');

            if(isUpload && lastResult) {
                const fileName = `${Date.now()}.json`;
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(lastResult))));
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${machineFolder}/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "save data", content })
                });
                addLog("SYNC SUCCESSFUL", "text-green-500");
            }

            // Get History List
            const listRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${machineFolder}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(listRes.ok) {
                const files = await listRes.json();
                history = files.filter(f => f.name.endsWith('.json')).map(f => f.path);
                hIdx = history.length - 1;
                document.getElementById('d-info').innerText = `${history.length} RECORDS`;
            }
        }

        async function loadHistory(idx) {
            if(idx < 0 || idx >= history.length) return;
            const user = document.getElementById('user-name').value;
            const token = document.getElementById('gh-token').value;
            const res = await fetch(`https://api.github.com/repos/${user}/h-data/contents/${history[idx]}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const fileData = await res.json();
            const json = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
            
            // 互換性処理：中段チェリー(mid_c)がない場合は0で補完
            if (json.machine === "VERSUS REVISE") {
                const hasMidC = json.data.find(d => d.id === "mid_c");
                if(!hasMidC) {
                    json.data.push({ id: "mid_c", name: "中段チェリー", count: 0, active: true, type: "big", probs: {1: 16384.0, 2: 16384.0, 5: 16384.0, 6: 897.8} });
                    // 再計算（設定6推測に影響させるため）
                    calculate(MACHINE_LIST[2], json.totalG, json.bb, json.data);
                    return;
                }
            }
            displayResult(json);
        }

        // --- Event Listeners ---

        document.getElementById('f-in').onchange = e => { if(e.target.files[0]) analyze(e.target.files[0]); };
        document.getElementById('m-prev').onclick = () => { currentIdx = (currentIdx - 1 + 3) % 3; updateMachine(); };
        document.getElementById('m-next').onclick = () => { currentIdx = (currentIdx + 1) % 3; updateMachine(); };
        document.getElementById('d-prev').onclick = () => { if(hIdx > 0) loadHistory(--hIdx); };
        document.getElementById('d-next').onclick = () => { if(hIdx < history.length - 1) loadHistory(++hIdx); };
        document.getElementById('sv-all').onclick = () => {
            localStorage.setItem('v_api', document.getElementById('api-key').value);
            localStorage.setItem('v_user', document.getElementById('user-name').value);
            localStorage.setItem('v_token', document.getElementById('gh-token').value);
            syncGH(true);
        };

        function updateMachine() {
            document.getElementById('m-name').innerText = MACHINE_LIST[currentIdx].name;
            document.getElementById('log-container').innerHTML = '';
            syncGH(false);
        }

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('v_api') || '';
            document.getElementById('user-name').value = localStorage.getItem('v_user') || '';
            document.getElementById('gh-token').value = localStorage.getItem('v_token') || '';
            updateMachine();
        };
    </script>
</body>
</html>
